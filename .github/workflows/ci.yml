name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://indexer:indexer@localhost:5432/indexer_rs

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: indexer_rs
          POSTGRES_USER: indexer
          POSTGRES_PASSWORD: indexer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U indexer -d indexer_rs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
