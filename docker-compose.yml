services:
  postgres:
    image: postgres:17-alpine
    container_name: indexer-rs-postgres
    environment:
      POSTGRES_DB: indexer_rs
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer -d indexer_rs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
